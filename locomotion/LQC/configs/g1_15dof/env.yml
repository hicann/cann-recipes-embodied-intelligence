environment:
  verbose: true
  num_envs: 2048
  simulation_dt: 0.002
  control_dt: 0.02
  max_time: 20.0
  pseudo_reset: 0.25
  symmetry: true
  symmetrize: true

  actuator:
    type: eam
    Kp: 30
    Kd: 0.5
    native: true
    lag1_ms: [ 6, 6 ]
    lag2_ms: [ 0, 2 ]
    Kp_gap: [ -2.0, 0 ]

  action:
    joint_pos: 2.0

  disturbance: true
  random_dynamics:
    enabled: true
    whole_body_inertial: true
    center_of_mass:
      x: [ -0.05, 0.05 ]
      y: [ -0.02, 0.02 ]
      z: [ -0.05, 0.05 ]
    actuator: [ 0., 0.1 ]
    friction: [ 0.2, 0.8 ]

  command_velocity:
    enabled: true
    decompose: true
    angular: false
    duration: [ 5.0, 10.0 ]
    velocity_range: [ 1., 0.5, 1. ]

  observation:
    - cmd_vel
    - cmd_stall
    - action_p1
    - N/ang_vel
    - N/roll_pitch
    - N/joint_pos
    - N/joint_vel
    - P/lin_vel

  proprioceptor:
    latency_ms: [ 0, 2 ]
    imu_frame: pelvis
    noise_std:
      ang_vel: 0.2

  reward:
    __SCALE: 0.2
    projected_vel: 0.5
    orthogonal_vel: 0.1
    angular_tracking: 0.2
    height_tracking: 0.1
    normalized_energy: -0.02
    body_posture: -0.05
    joint_pos: -0.02
    joint_pos_lim: -0.01
    joint_vel: -0.6e-4
    joint_acc: -0.8e-8
    collision: -0.1
    air_time: 0.3
    clearance: 1.0
    angular_motion: -0.003
    linear_motion: -0.01
    slippage: -0.005
    alive: 0.2
    gait: 0.1
    action_rate: -0.001
    contact_vel: -0.01

  curriculum:
    10000:
      reward:
        gait: 0.02
        contact_vel: -0.02
      reward_fn:
        joint_pos:
          expr: "abs(x)"
          coef: [ 0.5, 1., 1., 0.5, 0.5, 1.,
                  0.5, 1., 1., 0.5, 0.5, 1.,
                  1., 1., 1., ]

  reward_fn:
    linear_tracking:
      projection: "exp(-min(x, 0)^2)"
      orthogonal: "-min(abs(x), 0.5)"
    angular_tracking: "1-abs(x)*0.5"
    height_tracking: "exp(-8x^2)"
    linear_motion: "x^2"
    angular_motion: "x^2"
    body_posture:
      terrain_adaptive: false
      roll: "abs(x)"
      pitch: "abs(x)"
    joint_pos:
      expr: "abs(x)"
      coef: [ 0.5, 1., 1., 0.5, 0.5, 1.,
              0.5, 1., 1., 0.5, 0.5, 1.,
              1., 1., 4., ]
    joint_vel: "x^2"
    joint_acc: "x^2"
    normalized_energy: "x^2"
    slippage: "abs(x)"
    rhythm:
      expr: "-min(3x, 0.3 - min(x, 0.4))"
      clearance_clip: 0.2
    contact_vel: "x^2"
    action_rate: "x^2"

