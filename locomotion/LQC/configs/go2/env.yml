environment:
  verbose: true
  num_envs: 1024
  simulation_dt: 0.001
  control_dt: 0.005
  max_time: 20.0
  pseudo_reset: 0.25
  symmetry: true

  actuator:
    type: eam
    Kp: 30
    Kd: 0.5
    lag1_ms: [ 8, 9 ]
    lag2_ms: [ 0, 1 ]
    Kp_gap: [ -2.0, 0 ]
    Kd_gap: [ -0.15, 0.0 ]
    limit: [ 42, 0, 20 ]

  action:
    joint_pos: 0.5

  disturbance: true
  random_dynamics:
    enabled: true
    center_of_mass: true
    actuator: [ 0., 0.1 ]

  command_velocity:
    enabled: true
    duration: [ 2.0, 10.0 ]
    velocity_range: [ 2., 1., 2. ]

  observation:
    - cmd_vel
    - cmd_stall
    - action_p1
    - N/roll_pitch
    - N/joint_pos
    - N/joint_vel
    - N/ang_vel
    - P/lin_vel

  proprioceptor:
    latency_ms: [ 0, 2 ]

  reward:
    linear_tracking: 0.6
    angular_tracking: 0.25
    torque: -2.0e-4
    body_posture: -0.1
    joint_vel: -0.25e-4
    joint_acc: -0.4e-8
    collision: -0.2
    air_time: 0.8
    clearance: 1.0
    rhythm: -0.1
    angular_motion: -0.05
    linear_motion: -0.05
    slippage: -0.05
    alive: 0.2
    gait: -0.05
    body_height: 1.0

  reward_fn:
    linear_tracking:
      expr: "exp(-x^2)"
      orthogonal:
        enabled: false
    angular_tracking: "exp(-x^2)"
    linear_motion: "abs(x)"
    angular_motion: "1 - exp(-0.2x^2)"
    body_posture:
      terrain_adaptive: true
      roll: "abs(x)"
      pitch: "abs(x)"
    body_height:
      lower: 0.25
      upper: 0.33
    joint_vel: "x^2"
    joint_acc: "x^2"
    normalized_energy: "x^2"
    torque: "x^2"
    slippage: "x^2"
    rhythm:
      air_time_bias: -0.25
      air_time_clip: 0.3
    gait:
      strict: true

  curriculum:
    20000:
      reward:
        contact_vel: -0.02

  terrain:
    update_intv: 5
    proportions:
      rough: 0.5
    properties:
      rough:
        size: 40.
        grid: 0.1
        frequency: [ 0.1, 0.4 ]
        z_scale: [ 0., 1.0 ]
        fractal_octaves: [ 2, 5 ]
        fractal_lacunarity: [ 2.0, 5.0 ]
        fractal_gain: [ 0.2, 0.4 ]
        step_prob: 0.2
        step_size: [ 0., 0.1 ]
        slope_prob: 0.75
        slope_angle: [ 0, 10 ]
