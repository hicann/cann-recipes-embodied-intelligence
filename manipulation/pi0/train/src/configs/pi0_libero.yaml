dataset:
  repo_id: HuggingFaceVLA/libero
  root: ../dataset/HuggingFaceVLA/libero

policy:
  type: pi0
  device: npu
  push_to_hub: false
  dtype: bfloat16
  gradient_checkpointing: true
  compile_model: false
  pretrained_path: ../models/lerobot/pi0_base

output_dir: ../ckpt/pi0_libero
batch_size: 8
job_name: pi0_libero
resume: false
seed: 42
num_workers: 16
steps: 30000
eval_freq: -1
log_freq: 200
save_checkpoint: true
save_freq: 10000
use_policy_training_preset: true

wandb:
  enable: true
  project: lerobot
